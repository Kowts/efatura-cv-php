    <circle cx="248" cy="358" r="56" fill="#8b6bbe" stroke="#ffffff" stroke-width="7"/>
    <text class="bubbleText" x="248" y="352">Composer</text>
    <text class="bubbleSub" x="248" y="372">PACKAGIST</text>
