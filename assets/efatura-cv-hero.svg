<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">e-Fatura CV para PHP</title>
  <desc id="desc">Ilustração do pacote e-Fatura CV para PHP com DFE v11, assinatura XAdES-BES, Composer e integrações Laravel, Symfony e Yii2.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1117"/>
      <stop offset="1" stop-color="#101923"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7edf3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f05a5a"/>
      <stop offset="1" stop-color="#f78c3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { fill: #f8fafc; font: 700 21px Inter, Segoe UI, Arial, sans-serif; }
      .small { fill: #dbeafe; font: 600 14px Inter, Segoe UI, Arial, sans-serif; letter-spacing: .04em; }
      .mono { fill: #0f172a; font: 700 18px Consolas, Monaco, monospace; }
      .muted { fill: #9fb2c8; font: 600 15px Inter, Segoe UI, Arial, sans-serif; }
      .bubbleText { fill: #ffffff; font: 700 16px Inter, Segoe UI, Arial, sans-serif; text-anchor: middle; }
      .bubbleSub { fill: #eef6ff; font: 600 11px Inter, Segoe UI, Arial, sans-serif; text-anchor: middle; letter-spacing: .03em; }
    </style>
  </defs>

  <rect width="1120" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="176" cy="328" r="126" fill="#0f2433" opacity=".45"/>
  <circle cx="960" cy="88" r="150" fill="#142c3c" opacity=".42"/>

  <g filter="url(#shadow)">
    <circle cx="370" cy="210" r="132" fill="#eef2f7"/>
    <circle cx="370" cy="210" r="132" fill="none" stroke="#f15d5d" stroke-width="10"/>
    <circle cx="370" cy="210" r="102" fill="#dfe5eb"/>
    <circle cx="370" cy="210" r="72" fill="#26313b"/>

    <path d="M331 151c42 0 70 33 70 79-51-22-70-30-70-79z" fill="#f58235"/>
    <path d="M415 233c-8-47 3-85 33-99 24 15 9 74-33 99z" fill="#8bc34a"/>
