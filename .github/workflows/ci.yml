name: Testes

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Obter o código
        uses: actions/checkout@v5

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, gd, json, libxml, openssl, pdo_sqlite, zip
          coverage: none

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: Validar pacote Composer
        run: composer validate --strict

      - name: Testes
        run: composer test

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug
      - run: composer install --no-interaction --prefer-dist
      - run: composer cs
      - run: composer analyse
      - name: Cobertura mínima
        run: |
          php vendor/bin/phpunit --coverage-clover build/coverage.xml
          # Base medida em 08-07-2026: 62,02%. Aumentar sem permitir regressões.
          php tools/check-coverage.php build/coverage.xml 60
      - name: Auditoria de dependências
        run: composer audit
