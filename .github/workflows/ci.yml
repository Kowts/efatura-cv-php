name: Testes

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Obter o código
        uses: actions/checkout@v7

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, gd, json, libxml, openssl, pdo_sqlite, zip
          coverage: none

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: Validar pacote Composer
        run: composer validate --strict

      - name: Testes
        run: composer test

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug
      - run: composer install --no-interaction --prefer-dist
      - run: composer cs
      - run: composer analyse
      - name: Verificar referência automática da API
        run: composer docs:api:check
      - name: Cobertura mínima
        run: |
          php vendor/bin/phpunit --coverage-clover build/coverage.xml
          # Base medida em 08-07-2026: 62,02%. Aumentar sem permitir regressões.
          php tools/check-coverage.php build/coverage.xml 60
      - name: Auditoria de dependências
        run: composer audit

  dependency-range:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            composer_update_flags: '--prefer-lowest --prefer-stable'
            label: dependências mínimas
          - php: '8.4'
            composer_update_flags: ''
            label: dependências mais recentes
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, gd, json, libxml, openssl, pdo_sqlite, zip
          coverage: none
      - name: Resolver ${{ matrix.label }}
        run: composer update ${{ matrix.composer_update_flags }} --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer check

  yii2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, json, libxml, openssl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Instalar Yii2 apenas para teste de compatibilidade
        run: |
          composer config repositories.asset-packagist composer https://asset-packagist.org
          composer require --dev yiisoft/yii2 --with-all-dependencies --no-interaction --prefer-dist
      - run: php vendor/bin/phpunit tests/Yii2BridgeTest.php

  database:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: efatura
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --password=root"
          --health-interval=10s --health-timeout=5s --health-retries=10
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: efatura
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready --username=postgres --dbname=efatura"
          --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      EFATURA_TEST_MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=efatura
      EFATURA_TEST_MYSQL_USER: root
      EFATURA_TEST_MYSQL_PASSWORD: root
      EFATURA_TEST_PGSQL_DSN: pgsql:host=127.0.0.1;port=5432;dbname=efatura
      EFATURA_TEST_PGSQL_USER: postgres
      EFATURA_TEST_PGSQL_PASSWORD: root
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, pdo_pgsql
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: php vendor/bin/phpunit tests/PdoDriverIntegrationTest.php
